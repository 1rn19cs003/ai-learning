<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" font-size="12">
  <defs><marker id="v" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#21201C"/></marker></defs>
  <line x1="60" y1="240" x2="360" y2="240" stroke="#D9D6CE"/><line x1="60" y1="240" x2="60" y2="30" stroke="#D9D6CE"/>
  <text x="352" y="258" fill="#6B6862">x</text><text x="40" y="40" fill="#6B6862">y</text>
  <line x1="60" y1="240" x2="240" y2="150" stroke="#1A5FA5" stroke-width="3" marker-end="url(#v)"/>
  <text x="248" y="150" fill="#1A5FA5" font-weight="bold">a = [2, 1]</text>
  <line x1="60" y1="240" x2="150" y2="60" stroke="#C15F3C" stroke-width="3" marker-end="url(#v)"/>
  <text x="120" y="52" fill="#C15F3C" font-weight="bold">b = [1, 3]</text>
  <path d="M108,213 A 60 60 0 0 0 92 183" fill="none" stroke="#2E6B2E" stroke-width="2"/>
  <text x="118" y="188" fill="#2E6B2E" font-weight="bold">θ = 45°</text>
  <text x="430" y="60" fill="#21201C" font-weight="bold">cos θ tells you alignment:</text>
  <line x1="430" y1="95" x2="490" y2="95" stroke="#2E6B2E" stroke-width="3" marker-end="url(#v)"/><line x1="430" y1="95" x2="490" y2="95" stroke="#2E6B2E" stroke-width="3"/>
  <text x="500" y="99" fill="#6B6862">same way → cos ≈ 1</text>
  <line x1="430" y1="140" x2="490" y2="120" stroke="#8A867C" stroke-width="3" marker-end="url(#v)"/>
  <text x="500" y="132" fill="#6B6862">45° → cos ≈ 0.71</text>
  <line x1="430" y1="185" x2="470" y2="145" stroke="#8A867C" stroke-width="2"/><line x1="430" y1="185" x2="490" y2="185" stroke="#8A867C" stroke-width="2"/>
  <text x="500" y="185" fill="#6B6862">90° → cos = 0 (unrelated)</text>
  <line x1="430" y1="230" x2="490" y2="245" stroke="#B03030" stroke-width="3" marker-end="url(#v)"/>
  <text x="500" y="238" fill="#6B6862">opposite → cos ≈ −1</text>
</svg>
